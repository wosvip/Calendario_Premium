<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#07111f">
  <meta name="description" content="Calendário WosVIP com semanas ISO e feriados do Brasil.">

  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./assets/icons/icone-192.png" type="image/png">
  <link rel="apple-touch-icon" href="./assets/icons/icone-192.png">
  <link rel="stylesheet" href="./css/style.css">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Calendário WosVIP">

  <title>Calendário WosVIP</title>
</head>

<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <img class="brand-icon" src="./assets/icons/icone-192.png" alt="">
        <div class="brand-text">
          <h1>Calendário</h1>
          <p id="dataAtualCabecalho">Carregando data...</p>
        </div>
      </div>

      <button id="btnHoje" class="today-button" type="button">Hoje</button>
    </header>

    <section class="controls" aria-label="Seleção do calendário">
      <button id="mesAnterior" class="nav-button" type="button" aria-label="Mês anterior">‹</button>

      <div class="field">
        <label for="mes">Mês</label>
        <select id="mes" aria-label="Selecionar mês"></select>
      </div>

      <div class="field">
        <label for="ano">Ano</label>
        <select id="ano" aria-label="Selecionar ano"></select>
      </div>

      <button id="mesSeguinte" class="nav-button" type="button" aria-label="Próximo mês">›</button>
    </section>

    <section class="calendar-shell" aria-label="Calendário mensal">
      <table>
        <thead>
          <tr>
            <th class="week-col">Sem</th>
            <th class="sunday">Dom</th>
            <th>Seg</th>
            <th>Ter</th>
            <th>Qua</th>
            <th>Qui</th>
            <th>Sex</th>
            <th class="saturday">Sáb</th>
          </tr>
        </thead>
        <tbody id="calendario"></tbody>
      </table>
    </section>

    <section id="dataSelecionada" class="selected-info" aria-live="polite">
      <div class="selected-icon" aria-hidden="true">📅</div>
      <div class="selected-content">
        <span class="selected-label">Hoje</span>
        <strong id="selectedTitle">Carregando...</strong>
        <small id="selectedSubtitle">Nenhum evento cadastrado.</small>
      </div>
    </section>

    <section class="month-summary" aria-label="Resumo do mês">
      <div>
        <span>Dias</span>
        <strong id="resumoDias">—</strong>
      </div>
      <div>
        <span>Semanas</span>
        <strong id="resumoSemanas">—</strong>
      </div>
      <div>
        <span>Feriados</span>
        <strong id="resumoFeriados">—</strong>
      </div>
      <div>
        <span>Hoje</span>
        <strong id="resumoHoje">—</strong>
      </div>
    </section>

    <div class="developer">
      Desenvolvido por: <strong>WosVIP®</strong>
    </div>

    <section class="holidays-card">
      <h2>Feriados do mês</h2>
      <p class="holiday-subtitle">
        Feriados nacionais, datas observadas e pontos facultativos.
      </p>

      <ul id="listaFeriados"></ul>

      <div class="legend" aria-label="Legenda">
        <span><i class="today-key"></i> Hoje</span>
        <span><i class="holiday-key"></i> Feriado</span>
        <span><i class="week-key"></i> Semana atual</span>
      </div>
    </section>
  </main>

  <script src="./js/holidays.js"></script>
  <script src="./js/calendar.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
